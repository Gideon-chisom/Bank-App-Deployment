name: Bank Frontend Pipeline

on:
  push:
    branches:
    - main
    paths:
    - 'frontend/**'

jobs:
  Continues-Integration_build_and_push:
    runs-on: ubuntu-latest # replace with self-hosted later if needed

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Build Docker image (frontend)
      run: |
        cd frontend
        docker build -t bank-app-frontend:latest .

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
        docker login --username AWS --password-stdin ${{ vars.ECR_REPO }}

    - name: Tag Docker image
      run: |
        docker tag bank-app-frontend:latest \
        ${{ vars.ECR_REPO }}/bank-frontend:${{ github.run_number }}

    - name: Push image to ECR
      run: |
        docker push ${{ vars.ECR_REPO }}/bank-frontend:${{ github.run_number }}

    - name: Remove local Docker images
      run: |
        docker rmi bank-app-frontend:latest
        docker rmi ${{ vars.ECR_REPO }}/bank-frontend:${{ github.run_number }}

  Continues-Update_k8s_manifest:
    runs-on: ubuntu-latest
    needs: Continues-Integration_build_and_push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure Git
      run: |
        git config --global user.email "ogubuikegideon@gmail.com"
        git config --global user.name "Gideon-chisom"

    - name: Update Kubernetes manifest
      run: |
        sed -i "s+${{ vars.ECR_REPO }}/bank-frontend:.*+${{ vars.ECR_REPO }}/bank-frontend:${{ github.run_number }}+g" kubernetes-manifest/bank-project/frontend.yaml

    - name: Commit and push changes (if any)
      run: |
        git add kubernetes-manifest/bank-project/frontend.yaml

        git diff --quiet && echo "No changes to commit" || \
        git commit -m "Updated frontend image to version ${{ github.run_number }}"

        git push origin main
