name: Bank Backend Pipeline

on:
  push:
    branches:
    - main
    paths:
    - 'backend/**'

permissions:
  contents: write

jobs:
  Continues-Integration_build_and_push:
    runs-on: ubuntu-latest # switch to self-hosted later if needed

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Build Docker image (backend)
      run: |
        cd backend
        docker build -t bank-app-backend:latest .

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
        docker login --username AWS --password-stdin ${{ vars.ECR_REPO }}

    - name: Tag Docker image
      run: |
        docker tag bank-app-backend:latest \
        ${{ vars.ECR_REPO }}/bank-backendapi:${{ github.run_number }}

    - name: Push image to ECR
      run: |
        docker push ${{ vars.ECR_REPO }}/bank-backendapi:${{ github.run_number }}

    - name: Remove local Docker images
      run: |
        docker rmi bank-app-backend:latest
        docker rmi ${{ vars.ECR_REPO }}/bank-backendapi:${{ github.run_number }}

  Continues-Update_k8s_manifest:
    runs-on: ubuntu-latest
    needs: Continues-Integration_build_and_push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure Git
      run: |
        git config --global user.email "ogubuikegideon@gmail.com"
        git config --global user.name "Gideon-chisom"

    - name: Update Kubernetes manifest
      run: |
        sed -i "s+${{ vars.ECR_REPO }}/bank-backendapi:.*+${{ vars.ECR_REPO }}/bank-backendapi:${{ github.run_number }}+g" Kubernetes-manifest/bank-project/backendapi.yaml

    - name: Commit and push changes (if any)
      run: |
        git add Kubernetes-manifest/bank-project/backendapi.yaml

        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Updated backend image to version ${{ github.run_number }}"
          git push origin main
        fi
